services:
  - type: web
    name: mcp-server
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python start_mcp_server.py
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PORT
        value: "3000"
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: GDRIVE_TOKEN_JSON
        sync: false
      - key: GMAIL_TOKEN_JSON
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DEFAULT_WEEKS
        value: "8"
      - key: MAX_THEMES
        value: "5"
      - key: MAX_PULSE_WORDS
        value: "250"
      - key: LLM_MODEL
        value: "gpt-4o"
      - key: LLM_TOKEN_BUDGET
        value: "50000"
      - key: RETRY_MAX_ATTEMPTS
        value: "3"
      - key: MCP_LOG_LEVEL
        value: "INFO"
